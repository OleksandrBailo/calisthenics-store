<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bag_Lab_6-7</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/sort.css">
</head>

<body>
    <header>
        <div class="inHeader">
            <div class="logo"><img src="../imgs/IconsAndLogo/LOGOmain-removebg-preview.png" alt=""></div>
            <nav class="navHeader">
                <div class="navItem">Men</div>
                <div class="navItem">Women</div>
                <div class="navItem">Equipment</div>
                <div class="navItem">Accessories</div>
            </nav>
            <div class="searchAndIcons">
                <div class="aboveSearchBox">
                    <div class="searchBox">
                        <input id="searchInput" type="text" placeholder="Search">
                        <div class="icon Search"><img src="../imgs/IconsAndLogo/Search-icon.png" alt="searchIcon"></div>
                    </div>
                </div>
                <div class="icon"><a href="../admin/adminpanel.html"><img src="../imgs/IconsAndLogo/Profile-icon.png" alt="profileIcon"></a></div>
                <!-- <div class="icon"><img src="../imgs/Folowed-icon.png" alt="folowedIcon"></div> -->
                <div class="icon"><a href="bag.html" id="iconBag"><img src="../imgs/IconsAndLogo/Bag-icon.png" alt="bagIcon"><div class="qntInBag"><span>0</span></div></a></div>
                <div class="icon"><a href="../statistic.html/statistic.html"><img src="../imgs/IconsAndLogo/Statistic-icon.png" alt="statisticIcon"></a></div>
            </div>
        </div>
    </header>
    <main>
        <div class="inMain">
            <div class="Bag">
                <div class="topOfBag">
                    <div class="bagTitle-count">
                        <span class="bagTitle">Your Bag</span>
                        <span class="items-count">(0 Items)</span>
                    </div>
                </div>

                <div class="emptyBag">
                    <div class="emptyTitle">Uh-oh. It's empty!</div>
                    <div class="emptyText">Don't know where to start? Here's the gear everyone's after.</div>
                    <input class="emptyBagButton" type="button" value="Shop">
                </div>

                <div class="products">

                </div>

                <div id="confirmationModal" class="modal">
                    <div class="modal-content">
                        <span id="closeButton" class="close">x</span>
                        <div class="confirmationText">Are you sure you want to remove this item?</div>
                        <div class="confirmationButtons">
                            <input id="cancelButton" class="cancelButton" type="button" value="Nevermind">
                            <input id="confirmButton" class="confirmButton" type="button" value="Remove Item">
                        </div>
                    </div>
                </div>

                <div class="History">
                    <span class="historyTitle">History</span>
                </div>
                <div class="historyPayment">

                </div>

            </div>
            <div class="Order">
                <div class="inOrder">
                    <div class="orderSummary">Order Summary</div>
                    <div class="subtotal">
                        <div class="inSubtotal">Subtotal (<span>0</span>)</div>
                        <div class="subtotalPrice">$<span>0</span></div>
                    </div>
                    <div class="estimatedShipping">
                        <div class="inEstimatedShipping">Estimated Shipping:</div>
                        <div class="estimatedShippingPrice"><span>Free</span></div>
                    </div>
                </div>
                <div class="totalOrder">
                    <div class="estimatedOrder">
                        <div class="inEstimatedOrdr">Estimated Total:</div>
                        <div class="estimatedOrderPrice">$<span>0</span></div>
                    </div>
                </div>
                <div class="payment">
                    <input id="btnpayment" class="btnpayment" type="button" value="Payment">
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
