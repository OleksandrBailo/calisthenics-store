<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product_Lab_6-7</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../styles/header.css">
</head>

<body>
    <header>
        <div class="inHeader">
            <div class="logo"><img src="../imgs/IconsAndLogo/LOGOmain-removebg-preview.png" alt=""></div>
            <nav class="navHeader">
                <div class="navItem">Men</div>
                <div class="navItem">Women</div>
                <div class="navItem">Equipment</div>
                <div class="navItem">Accessories</div>
            </nav>
            <div class="searchAndIcons">
                <div class="aboveSearchBox">
                    <div class="searchBox">
                        <input id="searchInput" type="text" placeholder="Search">
                        <div class="icon Search"><img src="../imgs/IconsAndLogo/Search-icon.png" alt="searchIcon"></div>
                    </div>
                </div>
                <div class="icon"><a href="../admin/adminpanel.html"><img src="../imgs/IconsAndLogo/Profile-icon.png" alt="profileIcon"></a></div>
                <!-- <div class="icon"><img src="../imgs/Folowed-icon.png" alt="folowedIcon"></div> -->
                <div class="icon"><a href="../bag/bag.html" id="iconBag"><img src="../imgs/IconsAndLogo/Bag-icon.png" alt="bagIcon"><div class="qntInBag"><span>0</span></div></a></div>
                <div class="icon"><a href="../statistic.html/statistic.html"><img src="../imgs/IconsAndLogo/Statistic-icon.png" alt="statisticIcon"></a></div>
            </div>
        </div>
    </header>
    <main>


        <div class="product">
            <div class="img"><img id="productImage" src="../imgs/baselayer-white-front-dynamic.webp" alt=""></div>
            <div class="detail">
                <div class="nameProduct" id="productName">Performance Baselayer Men</div>
                <div class="price-rating">
                    <div class="price">$<span id="productPrice">31</span></div>
                    <div class="ratingSummury">
                        <div class="starsSummury" style="--rating: 4.3;"></div>
                        <span class="rating-valueSummury">4.3 (15)</span>
                    </div>
                </div>
                <div class="amount">Amount: <span id="productAmount">21</span></div>
            </div>
        </div>

        <div class="Reviews-section">
            <div class="titleAndButton">
                <div class="ReviewsTitle">Product Reviews</div>
                <input id="writeReviews" type="button" value="Write A Reviews">
            </div>
            <div id="Reviews">
                <div class="Review">
                    <div class="topOfReview">
                        <div class="displayNameReview">Antonio</div>
                        <div class="ratingReview">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
                        <div class="dateReview">14.04.2024</div>
                    </div>
                    <div class="titleReview">Amazing product!</div>
                    <div class="textReview">This is a placeholder for a customer review.</div>
                </div>
            </div>
        </div>


        <div class="modal" id="review-modal">
            <div class="modal-content">
                <span class="modal-close" id="close-modal">&times;</span>
                <div class="modal-header">Write a Review</div>
    
                <label for="rating">Overall Rating</label>
                <div class="rating-stars" id="rating-stars">
                    <span data-value="1">&#9733;</span>
                    <span data-value="2">&#9733;</span>
                    <span data-value="3">&#9733;</span>
                    <span data-value="4">&#9733;</span>
                    <span data-value="5">&#9733;</span>
                </div>
    
                <label for="review-title">Review Title</label>
                <input type="text" id="review-title" placeholder="Example: This product has great features">
    
                <label for="review">Review</label>
                <textarea id="review" rows="4" placeholder="Write at least 50 characters..."></textarea>
    
                <label for="display-name">Display Name</label>
                <input type="text" id="display-name" placeholder="Example: bob27">
    
                <div class="button-group">
                    <button class="cancel" id="cancel-modal">Cancel</button>
                    <button class="submit">Submit</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
